<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WC2026 Predictor{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e17;
            color: #e0e6f0;
            min-height: 100vh;
        }
        .navbar {
            background: linear-gradient(135deg, #0f1629 0%, #1a1f35 100%);
            border-bottom: 1px solid #2a3050;
            padding: 0.8rem 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar .logo {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f7c948, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            white-space: nowrap;
        }
        .navbar .logo span { color: #f7c948; }
        .navbar .nav-links { display: flex; gap: 1rem; flex-wrap: wrap; }
        .navbar .nav-links a {
            color: #8892b0;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .navbar .nav-links a:hover, .navbar .nav-links a.active {
            color: #f7c948;
            background: rgba(247, 201, 72, 0.1);
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem; }
        .card {
            background: linear-gradient(135deg, #141b2d 0%, #1a2238 100%);
            border: 1px solid #2a3050;
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #f7c948;
            margin-bottom: 1rem;
        }
        .btn {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f7c948, #f59e0b);
            color: #0a0e17;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(247,201,72,0.3); }
        .btn-outline {
            background: transparent;
            border: 1px solid #2a3050;
            color: #8892b0;
        }
        .btn-outline:hover { border-color: #f7c948; color: #f7c948; }
        .progress-bar {
            height: 8px;
            background: #1a2238;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-uefa { background: #3b82f6; color: #fff; }
        .badge-conmebol { background: #10b981; color: #fff; }
        .badge-caf { background: #f59e0b; color: #fff; }
        .badge-afc { background: #ef4444; color: #fff; }
        .badge-concacaf { background: #8b5cf6; color: #fff; }
        .badge-ofc { background: #06b6d4; color: #fff; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
        .grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 1rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.6rem 0.8rem; text-align: left; border-bottom: 1px solid #1a2238; }
        th { color: #8892b0; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
        tr:hover td { background: rgba(247,201,72,0.03); }
        .team-flag { display: inline-flex; align-items: center; gap: 0.5rem; }
        .rank-num { font-weight: 700; color: #f7c948; }
        .text-muted { color: #8892b0; }
        .text-gold { color: #f7c948; }
        .text-green { color: #10b981; }
        .text-red { color: #ef4444; }
        .fade-in { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .stat-value { font-size: 1.8rem; font-weight: 700; }
        .stat-label { font-size: 0.75rem; color: #8892b0; text-transform: uppercase; letter-spacing: 0.05em; }
        @media (max-width: 768px) {
            .grid-2, .grid-3, .grid-4, .grid-6 { grid-template-columns: 1fr; }
            .navbar { flex-direction: column; gap: 0.5rem; }
            .container { padding: 1rem; }
        }
        .bracket {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            padding: 1rem 0;
        }
        .bracket-round {
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .bracket-round h4 {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #f7c948;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }
        .bracket-match {
            background: #1a2238;
            border: 1px solid #2a3050;
            border-radius: 6px;
            padding: 0.5rem 0.8rem;
            font-size: 0.8rem;
        }
        .bracket-match .teams { display: flex; justify-content: space-between; }
        .bracket-match .score { font-weight: 700; }
        .bracket-match .winner { color: #f7c948; }
        .bracket-match .loser { color: #8892b0; }
        .form-indicator { display: flex; gap: 2px; }
        .form-w { width: 14px; height: 14px; border-radius: 3px; background: #10b981; }
        .form-d { width: 14px; height: 14px; border-radius: 3px; background: #f59e0b; }
        .form-l { width: 14px; height: 14px; border-radius: 3px; background: #ef4444; }
        .factor-bar { display: flex; align-items: center; gap: 0.5rem; margin: 0.3rem 0; }
        .factor-bar .label { min-width: 100px; font-size: 0.8rem; }
        .factor-bar .bar { flex: 1; height: 6px; background: #1a2238; border-radius: 3px; position: relative; }
        .factor-bar .bar .fill { height: 100%; border-radius: 3px; }
        .factor-bar .value { min-width: 40px; text-align: right; font-size: 0.8rem; }
        .champion-badge {
            background: linear-gradient(135deg, #f7c948, #f59e0b);
            color: #0a0e17;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.8rem;
            display: inline-block;
        }
        .sentiment-pos { color: #10b981; }
        .sentiment-neg { color: #ef4444; }
        .sentiment-neu { color: #f59e0b; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">WC2026 PREDICTOR</a>
        <div class="nav-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">Dashboard</a>
            <a href="/rankings" class="{% if request.path == '/rankings' %}active{% endif %}">Rankings</a>
            <a href="/groups" class="{% if request.path == '/groups' %}active{% endif %}">Groups</a>
            <a href="/simulate" class="{% if request.path == '/simulate' %}active{% endif %}">Simulate</a>
            <a href="/head-to-head" class="{% if request.path == '/head-to-head' %}active{% endif %}">H2H</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.card').forEach((el, i) => {
                el.style.animationDelay = (i * 0.1) + 's';
                el.classList.add('fade-in');
            });
        });
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
